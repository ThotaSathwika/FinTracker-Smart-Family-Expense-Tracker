{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-lg-4 mb-4">
        <div class="card shadow">
            <div class="card-header bg-success text-white py-3">
                <h6 class="m-0 font-weight-bold">Add Income</h6>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('income') }}">
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="source" class="form-label">Source</label>
                        <input type="text" class="form-control" id="source" name="source" placeholder="Salary, Bonus, etc." required>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" class="form-control" id="date" name="date">
                    </div>
                    <button type="submit" class="btn btn-success w-100">Add Income</button>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-8 mb-4">
        <div class="card shadow">
            <div class="card-header py-3 d-flex flex-row align-items-center justify-content-between">
                <h6 class="m-0 font-weight-bold text-success">Income History</h6>
                <button class="btn btn-sm btn-outline-secondary" onclick="window.print()">Export PDF</button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Source</th>
                                <th>Amount</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for inc in incomes %}
                            <tr>
                                <td>{{ inc.date.strftime('%Y-%m-%d') }}</td>
                                <td>{{ inc.source }}</td>
                                <td class="text-success">+${{ "%.2f"|format(inc.amount) }}</td>
                                <td>
                                    <a href="{{ url_for('delete_income', income_id=inc.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this income?');">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="4" class="text-center">No income recorded yet.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
